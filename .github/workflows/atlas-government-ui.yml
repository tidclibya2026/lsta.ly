name: LSTA Government UI CI

on:
  pull_request:
    paths:
      - "apps/atlas-government/**"
      - ".github/workflows/atlas-government-ui.yml"
  push:
    branches: [main]
    paths:
      - "apps/atlas-government/**"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/atlas-government
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/atlas-government/package-lock.json
      - name: Install dependencies
        run: npm install
      - name: TypeScript check
        run: npm run typecheck
      - name: Production build
        run: npm run build
