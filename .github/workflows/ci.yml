name: LSTA Full CI
on: [pull_request]
permissions: {contents: read}
jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env: {POSTGRES_DB: lsta_test, POSTGRES_USER: lsta_test, POSTGRES_PASSWORD: test_only_password}
        ports: ["5432:5432"]
        options: --health-cmd "pg_isready -U lsta_test -d lsta_test" --health-interval 5s --health-timeout 5s --health-retries 12
    defaults: {run: {working-directory: services/atlas-api}}
    env:
      DATABASE_URL: postgresql+psycopg://lsta_test:test_only_password@localhost:5432/lsta_test
      LSTA_TEST_DATABASE_URL: postgresql+psycopg://lsta_test:test_only_password@localhost:5432/lsta_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11", cache: pip, cache-dependency-path: services/atlas-api/requirements.txt}
      - run: pip install -r requirements.txt
      - run: python -m ruff check app alembic tests
      - run: python -m compileall app alembic tests
      - run: python -m alembic upgrade head
      - run: test "$(python -m alembic heads | wc -l)" -eq 1
      - run: python -m pytest -v
  merge-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install -r requirements-dev.txt
      - run: python -m ruff check tools/merge_engine tests/test_merge_engine.py
      - run: python -m pytest tests/test_merge_engine.py -v
  frontend:
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: apps/atlas-government}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 24, cache: npm, cache-dependency-path: apps/atlas-government/package-lock.json}
      - run: npm ci
      - run: npm run test
      - run: npm run typecheck
      - run: npm run build
        env: {NEXT_PUBLIC_LSTA_DEPLOYMENT_MODE: static-demo}
      - run: '! grep -R -E "localhost:8000|D:\\\\lsta.ly" out'
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: python scripts/verify_sensitive_files.py
