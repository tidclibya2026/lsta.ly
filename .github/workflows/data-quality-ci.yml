name: LSTA Data Quality CI

on:
  push:
    branches:
      - main
      - quality-tests-ci-v1
    paths:
      - "tools/**"
      - "tests/**"
      - "data/mappings/**"
      - "database/**"
      - "requirements-dev.txt"
      - ".github/workflows/data-quality-ci.yml"
  pull_request:
    paths:
      - "tools/**"
      - "tests/**"
      - "data/mappings/**"
      - "database/**"
      - "requirements-dev.txt"
      - ".github/workflows/data-quality-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lsta-data-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Validate Python syntax
        run: python -m compileall -q tools tests

      - name: Run Ruff checks
        run: ruff check tools tests

      - name: Run unit tests
        run: pytest -q --cov=tools --cov-report=term-missing --cov-fail-under=65

      - name: Validate YAML mapping
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          path = Path("data/mappings/atlas_layers_v1.yml")
          payload = yaml.safe_load(path.read_text(encoding="utf-8"))
          required_layers = {"hotels", "resorts_villages", "restaurants", "cafes", "thematic_layers"}
          actual_layers = set(payload.get("layers", {}))
          missing = required_layers - actual_layers
          if missing:
              raise SystemExit(f"Missing mapping layers: {sorted(missing)}")
          print("Mapping file is valid and contains all required layers.")
          PY
