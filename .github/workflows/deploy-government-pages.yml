name: Deploy LSTA Government Alpha

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/atlas-government/package-lock.json
      - run: npm ci
        working-directory: apps/atlas-government
      - run: npm run test
        working-directory: apps/atlas-government
      - run: npm run typecheck
        working-directory: apps/atlas-government
      - run: npm run build
        working-directory: apps/atlas-government
        env:
          GITHUB_ACTIONS: "true"
          NEXT_PUBLIC_LSTA_DEPLOYMENT_MODE: static-demo
          NEXT_PUBLIC_LSTA_BASE_PATH: /lsta.ly
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/atlas-government/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
