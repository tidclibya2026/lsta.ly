name: LSTA Government Alpha CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop, "release/**"]

permissions:
  contents: read

concurrency:
  group: lsta-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Government Portal
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/atlas-government
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/atlas-government/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Tests
        run: npm test
      - name: TypeScript
        run: npm run typecheck
      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_LSTA_API_URL: http://localhost:8000

  backend:
    name: Atlas API
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: lsta_test
          POSTGRES_USER: lsta_test
          POSTGRES_PASSWORD: lsta_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lsta_test -d lsta_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: services/atlas-api
    env:
      DATABASE_URL: postgresql+psycopg://lsta_test:lsta_test_password@localhost:5432/lsta_test
      LSTA_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/atlas-api/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile
        run: python -m compileall app
      - name: Ruff
        run: ruff check .
      - name: Migrations
        run: alembic upgrade head
      - name: Tests
        run: pytest

  importer:
    name: KML Importer
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install importer dependencies
        run: pip install -r requirements-dev.txt
      - name: Compile importer
        run: python -m compileall tools/kml_importer
      - name: Ruff importer
        run: ruff check tools/kml_importer
      - name: Importer tests
        run: pytest tests/test_kml_importer.py
