name: LSTA Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Resolve release notes
        id: notes
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          FILE="docs/releases/${TAG#v}.md"
          if [ -f "$FILE" ]; then
            echo "file=$FILE" >> "$GITHUB_OUTPUT"
          else
            echo "file=CHANGELOG.md" >> "$GITHUB_OUTPUT"
          fi
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "LSTA ${GITHUB_REF_NAME}" \
            --notes-file "${{ steps.notes.outputs.file }}" \
            --verify-tag
