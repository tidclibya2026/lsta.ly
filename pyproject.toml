[tool.pytest.ini_options]
addopts = "-ra"
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
target-version = "py312"
line-length = 120
exclude = [".git", ".venv", "venv", "data/raw"]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

[tool.coverage.run]
branch = true
source = ["tools"]

[tool.coverage.report]
show_missing = true
skip_covered = false
